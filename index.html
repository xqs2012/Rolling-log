<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>滚木规则怪谈 · 维护中</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #c0c0c0;
            font-family: "Microsoft YaHei", "苹方", "PingFang SC", sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }
        .maintenance-box {
            background: linear-gradient(180deg, #1a1025 0%, #0f0a18 100%);
            border: 1px solid #ffaa00;
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 0 60px rgba(255, 136, 0, 0.3);
        }
        h1 {
            font-size: 2.2em;
            color: #ff6666;
            text-shadow: 0 0 25px rgba(255, 60, 60, 0.5);
            margin-bottom: 15px;
            letter-spacing: 3px;
        }
        .status-icon {
            font-size: 4em;
            margin-bottom: 15px;
        }
        p {
            color: #ddd;
            line-height: 1.8;
            margin: 10px 0;
            font-size: 1.05em;
        }
        .update-hint {
            color: #ffaa00;
            font-weight: bold;
            margin-top: 20px;
        }
        .footer {
            margin-top: 25px;
            font-size: 0.8em;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="maintenance-box">
        <div class="status-icon">🛠️</div>
        <h1>更新维护中</h1>
        <p>游戏正在紧急维护，我们将对游戏内容进行重要更新。</p>
        <p>预计恢复时间：7.15<span style="color:#ffaa00;">请关注后续通知</span></p>
        <p class="update-hint">感谢你的耐心等待，新版本即将到来！</p>
        <div class="footer">
            —— xqs ——
        </div>
    </div>
</body>
</html>
